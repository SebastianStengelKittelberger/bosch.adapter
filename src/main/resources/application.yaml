spring:
  application:
    name: bosch.adapter
xml:
  directory: data/xml
  product-limit: 10     # set to -1 to process all products
  product-ids: 100024723  # comma-separated list of product IDs to process; empty = all
server:
  servlet:
    context-path: /adapter
  port: 8082
domain:
  media:
    default: https://www.bosch-professional.com
