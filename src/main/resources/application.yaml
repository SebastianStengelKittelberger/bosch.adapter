spring:
  application:
    name: bosch.adapter
  mvc:
    async:
      request-timeout: 1800000  # 30 minutes — needed for StreamingResponseBody
xml:
  directory: data/xml
  product-limit: -1     # set to -1 to process all products
  product-ids:   # comma-separated list of product IDs to process; empty = all
server:
  servlet:
    context-path: /adapter
  port: 8082
  tomcat:
    connection-timeout: 1800000
    keep-alive-timeout: 1800000
domain:
  media:
    default: https://www.bosch-professional.com

elasticsearch:
  enabled: true                      # auf true setzen um Produkte nach ES zu schreiben
  host: localhost
  port: 9200
  product-index-prefix: bosch-products    # Index: {prefix}-{country}-{language}
  reference-index-prefix: bosch-references # Index: {prefix}-{country}-{language}
  media-object-index: bosch-media-objects  # global, locale-independent
  config-index: bosch-config               # global config values (domain etc.)
  batch-size: 100
